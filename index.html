<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro OS Meal Planner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Space+Grotesk:wght@400;700&display=swap');

        :root {
            --bg-color: #ebdccb;
            --window-bg: #fffcf7;
            --border-clr: #000000;
            --accent-orange: #e15c32;
            --accent-pink: #f2a6b4;
            --accent-blue: #3283c4;
            --folder-yellow: #f5cd79;
            --ryan-blue: #d2e4f1;
            --bea-pink: #fcdbdc;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-color);
            color: var(--border-clr);
            padding: 30px;
            min-height: 100vh;
        }

        /* Top Menu bar */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid var(--border-clr);
            background-color: var(--window-bg);
            padding: 8px 20px;
            box-shadow: 4px 4px 0px var(--border-clr);
            margin-bottom: 30px;
            border-radius: 4px;
        }

        .nav-logo {
            font-family: 'Courier Prime', monospace;
            font-weight: 700;
            font-size: 1.4rem;
            text-transform: uppercase;
        }

        .window-controls-dummy {
            display: flex;
            gap: 8px;
        }

        .dot-control {
            width: 12px;
            height: 12px;
            border: 2px solid var(--border-clr);
            border-radius: 50%;
            background: white;
        }

        /* Reusable Retro UI Window Wrapper */
        .retro-window {
            background-color: var(--window-bg);
            border: 2px solid var(--border-clr);
            border-radius: 8px;
            box-shadow: 6px 6px 0px var(--border-clr);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .window-header {
            background-color: var(--accent-pink);
            border-bottom: 2px solid var(--border-clr);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Courier Prime', monospace;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .window-header.blue-variant {
            background-color: var(--accent-blue);
            color: white;
        }

        .window-header.yellow-variant {
            background-color: var(--folder-yellow);
        }

        .window-body {
            padding: 20px;
        }

        /* 2-Week Live Calendar Styles */
        .calendar-container {
            overflow-x: auto;
            padding-bottom: 5px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(14, minmax(110px, 1fr));
            gap: 10px;
        }

        .cal-day-header {
            text-align: center;
            font-family: 'Courier Prime', monospace;
            font-weight: 700;
            font-size: 0.8rem;
            border-bottom: 2px solid var(--border-clr);
            padding-bottom: 4px;
            line-height: 1.2;
        }

        .cal-day-header .date-sub {
            display: block;
            font-size: 0.7rem;
            font-weight: normal;
            color: #555;
            margin-top: 2px;
        }

        .cal-input-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
            margin-top: 6px;
        }

        .cal-row-label {
            font-size: 0.7rem;
            font-weight: bold;
            text-transform: uppercase;
            margin-bottom: -2px;
            font-family: 'Courier Prime', monospace;
        }

        .cal-input {
            width: 100%;
            border: 2px solid var(--border-clr);
            border-radius: 4px;
            padding: 6px;
            font-family: inherit;
            font-size: 0.8rem;
            outline: none;
        }

        .cal-input.ryan { background-color: var(--ryan-blue); }
        .cal-input.bea { background-color: var(--bea-pink); }
        .cal-input:focus { background-color: #ffffff; }

        /* Workspace Split Grid for meals/shopping */
        .desktop-layout {
            display: grid;
            grid-template-columns: 1.2fr 1fr;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        @media (max-width: 900px) {
            .desktop-layout {
                grid-template-columns: 1fr;
            }
        }

        /* Meal Planner Layout */
        .chat-layout {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .day-bubble-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .day-tag {
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            font-family: 'Courier Prime', monospace;
            display: inline-block;
        }

        .chat-bubble-input {
            width: 100%;
            border: 2px solid var(--border-clr);
            border-radius: 12px;
            padding: 10px 15px;
            background-color: white;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
        }

        .chat-bubble-input:focus { background-color: #fffdf0; }
        .lunch-box input { background-color: #fff2ed; }

        /* Grocery Tracker Elements */
        .search-bar-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .retro-input {
            flex: 1;
            border: 2px solid var(--border-clr);
            border-radius: 4px;
            padding: 10px;
            font-family: 'Courier Prime', monospace;
            font-size: 1rem;
            background-color: white;
            outline: none;
        }

        .retro-btn {
            border: 2px solid var(--border-clr);
            background-color: var(--window-bg);
            padding: 0 20px;
            font-family: 'Courier Prime', monospace;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 3px 3px 0px var(--border-clr);
            border-radius: 4px;
        }

        .retro-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px var(--border-clr);
        }

        .shopping-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .grocery-item {
            display: flex;
            align-items: center;
            border: 2px solid var(--border-clr);
            background: white;
            padding: 10px 15px;
            border-radius: 6px;
            box-shadow: 2px 2px 0px var(--border-clr);
            cursor: pointer;
        }

        .grocery-item.checked {
            background-color: #f0ede6;
            opacity: 0.7;
        }

        .grocery-item.checked .item-text {
            text-decoration: line-through;
        }

        .retro-checkbox {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border-clr);
            background: white;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .grocery-item.checked .retro-checkbox::after {
            content: "";
            width: 8px;
            height: 8px;
            background: var(--accent-orange);
        }

        .item-text {
            flex: 1;
            font-weight: 700;
            font-size: 1rem;
        }

        .delete-btn {
            background: none;
            border: none;
            font-family: monospace;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .checker-banner {
            height: 16px;
            background-image: linear-gradient(45deg, #000 25%, transparent 25%), linear-gradient(-45deg, #000 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #000 75%), linear-gradient(-45deg, transparent 75%, #000 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
            background-color: var(--accent-blue);
            border-bottom: 2px solid var(--border-clr);
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-logo">💾 FOOD_OS // v1.6_FIXED</div>
        <div class="window-controls-dummy">
            <div class="dot-control"></div>
            <div class="dot-control"></div>
            <div class="dot-control"></div>
        </div>
    </nav>

    <section class="retro-window">
        <div class="window-header yellow-variant">
            <span>System_Schedule: Rolling_2_Weeks.exe</span>
            <span>✖</span>
        </div>
        <div class="window-body calendar-container">
            <div class="calendar-grid" id="calendar-grid">
                </div>
        </div>
    </section>

    <main class="desktop-layout">
        
        <section class="retro-window">
            <div class="window-header">
                <span>Group Chat: What's Cooking This Week?</span>
                <span>✖</span>
            </div>
            <div class="window-body chat-layout" id="meal-chat-container">
                </div>
        </section>

        <section class="retro-window">
            <div class="window-header blue-variant">
                <span>System Error: Missing Ingredients</span>
                <span>✖</span>
            </div>
            <div class="checker-banner"></div>
            <div class="window-body">
                <div class="search-bar-container">
                    <input type="text" id="item-input" class="retro-input" placeholder="Search / Add item...">
                    <button onclick="addItem()" class="retro-btn">Enter...</button>
                </div>
                <ul class="shopping-list" id="shopping-list">
                    </ul>
            </div>
        </section>

    </main>

    <script>
        const dayNames = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
        const fullDayNames = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        
        // Stateful LocalStorage Setup
        let mealPlan = JSON.parse(localStorage.getItem('retro_mealPlan')) || {};
        let shoppingList = JSON.parse(localStorage.getItem('retro_shoppingList')) || [
            { name: 'Oat Milk', checked: false },
            { name: 'Tomatoes', checked: true }
        ];
        let calendarPlan = JSON.parse(localStorage.getItem('retro_calendarPlan')) || {};

        // Helper function to find the Monday of the current week
        function getCurrentWeekMonday() {
            const today = new Date();
            const day = today.getDay();
            const diff = today.getDate() - day + (day === 0 ? -6 : 1); 
            const monday = new Date(today.setDate(diff));
            monday.setHours(0,0,0,0);
            return monday;
        }

        const currentMonday = getCurrentWeekMonday();

        // 1. GENERATE THE LIVE 2-WEEK CALENDAR ENTRIES
        const calendarGrid = document.getElementById('calendar-grid');
        
        for (let i = 0; i < 14; i++) {
            const targetDate = new Date(currentMonday);
            targetDate.setDate(currentMonday.getDate() + i);

            const dayName = dayNames[targetDate.getDay() === 0 ? 6 : targetDate.getDay() - 1];
            const dateString = `${targetDate.getDate().toString().padStart(2, '0')}/${(targetDate.getMonth() + 1).toString().padStart(2, '0')}`;
            const dateStorageKey = targetDate.toISOString().split('T')[0];

            // CRITICAL FIX: Ensure the object skeleton exists in state immediately on load
            if (!calendarPlan[dateStorageKey]) {
                calendarPlan[dateStorageKey] = { ryan: '', bea: '' };
            }

            const dayCol = document.createElement('div');
            dayCol.className = 'calendar-column';
            dayCol.innerHTML = `
                <div class="cal-day-header">
                    ${dayName}
                    <span class="date-sub">${dateString}</span>
                </div>
                <div class="cal-input-group">
                    <div class="cal-row-label">Ryan</div>
                    <input type="text" class="cal-input ryan" value="${calendarPlan[dateStorageKey].ryan || ''}" placeholder="..." oninput="updateCalendar('${dateStorageKey}', 'ryan', this.value)">
                    <div class="cal-row-label">Bea</div>
                    <input type="text" class="cal-input bea" value="${calendarPlan[dateStorageKey].bea || ''}" placeholder="..." oninput="updateCalendar('${dateStorageKey}', 'bea', this.value)">
                </div>
            `;
            calendarGrid.appendChild(dayCol);
        }

        // Save the calendar state immediately to confirm structure persistence
        localStorage.setItem('retro_calendarPlan', JSON.stringify(calendarPlan));

        function updateCalendar(dateKey, person, value) {
            calendarPlan[dateKey][person] = value;
            localStorage.setItem('retro_calendarPlan', JSON.stringify(calendarPlan));
        }

        // 2. GENERATE THE MEAL PLANNER
        const chatContainer = document.getElementById('meal-chat-container');
        fullDayNames.forEach(day => {
            if (!mealPlan[day]) mealPlan[day] = { lunch: '', dinner: '' };
            
            const daySection = document.createElement('div');
            daySection.className = 'day-bubble-row';
            daySection.innerHTML = `
                <div class="day-tag">● User_${day}</div>
                <div class="lunch-box">
                    <input type="text" class="chat-bubble-input" value="${mealPlan[day].lunch || ''}" placeholder="Lunch plan..." oninput="updateMeal('${day}', 'lunch', this.value)">
                </div>
                <div class="dinner-box">
                    <input type="text" class="chat-bubble-input" value="${mealPlan[day].dinner || ''}" placeholder="Dinner plan..." oninput="updateMeal('${day}', 'dinner', this.value)">
                </div>
            `;
            chatContainer.appendChild(daySection);
        });

        localStorage.setItem('retro_mealPlan', JSON.stringify(mealPlan));

        function updateMeal(day, mealType, value) {
            mealPlan[day][mealType] = value;
            localStorage.setItem('retro_mealPlan', JSON.stringify(mealPlan));
        }

        // 3. GROCERY ENGINE
        function renderShoppingList() {
            const listEl = document.getElementById('shopping-list');
            listEl.innerHTML = '';
            
            shoppingList.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = `grocery-item ${item.checked ? 'checked' : ''}`;
                li.innerHTML = `
                    <div class="retro-checkbox" onclick="toggleItem(${index})"></div>
                    <span class="item-text" onclick="toggleItem(${index})">${item.name}</span>
                    <button class="delete-btn" onclick="deleteItem(${index})">⌫</button>
                `;
                listEl.appendChild(li);
            });
            localStorage.setItem('retro_shoppingList', JSON.stringify(shoppingList));
        }

        function addItem() {
            const input = document.getElementById('item-input');
            const val = input.value.trim();
            if (val !== '') {
                shoppingList.push({ name: val, checked: false });
                input.value = '';
                renderShoppingList();
            }
        }

        document.getElementById('item-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addItem();
        });

        function toggleItem(index) {
            shoppingList[index].checked = !shoppingList[index].checked;
            renderShoppingList();
        }

        function deleteItem(index) {
            shoppingList.splice(index, 1);
            renderShoppingList();
        }

        renderShoppingList();
    </script>
</body>
</html>
