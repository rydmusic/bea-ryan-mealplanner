<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Retro OS Meal Planner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Courier+Prime:ital,wght@0,400;0,700;1,400;1,700&family=Space+Grotesk:wght@400;700&display=swap');

        :root {
            --bg-color: #ebdccb;
            --window-bg: #fffcf7;
            --border-clr: #000000;
            --accent-orange: #e15c32;
            --accent-pink: #f2a6b4;
            --accent-blue: #3283c4;
            --folder-yellow: #f5cd79;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Space Grotesk', sans-serif;
            background-color: var(--bg-color);
            color: var(--border-clr);
            padding: 30px;
            min-height: 100vh;
        }

        /* Top Menu bar */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 2px solid var(--border-clr);
            background-color: var(--window-bg);
            padding: 8px 20px;
            box-shadow: 4px 4px 0px var(--border-clr);
            margin-bottom: 30px;
            border-radius: 4px;
        }

        .nav-logo {
            font-family: 'Courier Prime', monospace;
            font-weight: 700;
            font-size: 1.4rem;
            text-transform: uppercase;
        }

        .window-controls-dummy {
            display: flex;
            gap: 8px;
        }

        .dot-control {
            width: 12px;
            height: 12px;
            border: 2px solid var(--border-clr);
            border-radius: 50%;
            background: white;
        }

        /* Reusable Retro UI Window Wrapper */
        .retro-window {
            background-color: var(--window-bg);
            border: 2px solid var(--border-clr);
            border-radius: 8px;
            box-shadow: 6px 6px 0px var(--border-clr);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            margin-bottom: 30px;
        }

        .window-header {
            background-color: var(--accent-pink);
            border-bottom: 2px solid var(--border-clr);
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-family: 'Courier Prime', monospace;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .window-header.blue-variant {
            background-color: var(--accent-blue);
            color: white;
        }

        .window-header.orange-variant {
            background-color: var(--accent-orange);
            color: white;
        }

        .window-header.yellow-variant {
            background-color: var(--folder-yellow);
        }

        .window-body {
            padding: 20px;
        }

        /* 3 Column Desktop Layout */
        .desktop-layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 30px;
            max-width: 1400px;
            margin: 0 auto;
        }

        .full-width {
            grid-column: span 2;
        }

        @media (max-width: 900px) {
            .desktop-layout {
                grid-template-columns: 1fr;
            }
            .full-width {
                grid-column: span 1;
            }
        }

        /* Meal Planner Layout */
        .chat-layout {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .day-bubble-row {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .day-tag {
            font-size: 0.85rem;
            font-weight: bold;
            text-transform: uppercase;
            font-family: 'Courier Prime', monospace;
            display: inline-block;
        }

        .chat-bubble-input {
            width: 100%;
            border: 2px solid var(--border-clr);
            border-radius: 12px;
            padding: 10px 15px;
            background-color: white;
            font-family: inherit;
            font-size: 0.95rem;
            outline: none;
        }

        .chat-bubble-input:focus { background-color: #fffdf0; }
        .lunch-box input { background-color: #fff2ed; }

        /* Grocery Tracker Elements */
        .search-bar-container {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .retro-input {
            flex: 1;
            border: 2px solid var(--border-clr);
            border-radius: 4px;
            padding: 10px;
            font-family: 'Courier Prime', monospace;
            font-size: 1rem;
            background-color: white;
            outline: none;
        }

        .retro-btn {
            border: 2px solid var(--border-clr);
            background-color: var(--window-bg);
            padding: 0 20px;
            font-family: 'Courier Prime', monospace;
            font-weight: 700;
            cursor: pointer;
            box-shadow: 3px 3px 0px var(--border-clr);
            border-radius: 4px;
        }

        .retro-btn:active {
            transform: translate(2px, 2px);
            box-shadow: 1px 1px 0px var(--border-clr);
        }

        .shopping-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .grocery-item {
            display: flex;
            align-items: center;
            border: 2px solid var(--border-clr);
            background: white;
            padding: 10px 15px;
            border-radius: 6px;
            box-shadow: 2px 2px 0px var(--border-clr);
            cursor: pointer;
        }

        .grocery-item.checked {
            background-color: #f0ede6;
            opacity: 0.7;
        }

        .grocery-item.checked .item-text {
            text-decoration: line-through;
        }

        .retro-checkbox {
            width: 18px;
            height: 18px;
            border: 2px solid var(--border-clr);
            background: white;
            margin-right: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .grocery-item.checked .retro-checkbox::after {
            content: "";
            width: 8px;
            height: 8px;
            background: var(--accent-orange);
        }

        .item-text {
            flex: 1;
            font-weight: 700;
            font-size: 1rem;
        }

        .delete-btn {
            background: none;
            border: none;
            font-family: monospace;
            font-weight: bold;
            font-size: 1.1rem;
            cursor: pointer;
        }

        .checker-banner {
            height: 16px;
            background-image: linear-gradient(45deg, #000 25%, transparent 25%), linear-gradient(-45deg, #000 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #000 75%), linear-gradient(-45deg, transparent 75%, #000 75%);
            background-size: 16px 16px;
            background-position: 0 0, 0 8px, 8px -8px, -8px 0px;
            background-color: var(--accent-blue);
            border-bottom: 2px solid var(--border-clr);
        }

        /* Prep Diagnostics Log window styles */
        .prep-log {
            font-family: 'Courier Prime', monospace;
            background: #222;
            color: #1aff1a;
            padding: 15px;
            border-radius: 6px;
            font-size: 0.9rem;
            line-height: 1.5;
            max-height: 200px;
            overflow-y: auto;
        }
        .prep-item {
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <nav class="top-nav">
        <div class="nav-logo">💾 FOOD_OS // v3.0_FINAL_PROD</div>
        <div class="window-controls-dummy">
            <div class="dot-control"></div>
            <div class="dot-control"></div>
            <div class="dot-control"></div>
        </div>
    </nav>

    <main class="desktop-layout">

        <section class="retro-window full-width">
            <div class="window-header yellow-variant">
                <span>System_Schedule: Shared_iCloud_Calendar.live</span>
                <span>✖</span>
            </div>
            <div class="window-body" style="padding: 0; height: 320px; background-color: #ffffff;">
                <iframe 
                    src="https://open-web-calendar.hosted.quelltext.eu/calendar.html?url=https%3A%2F%2Fp71-caldav.icloud.com%2Fpublished%2F2%2FNDExODI0MTIzNDExODI0MYev8Apu_-PoflykAHs6lUaUKgnPiG8zFY4VKkUpkx4N8xkW8ITpSd5sVW5iC5foEhNZZwxGqCzUL43NeMX_wtE&skin=flat&tabs=week&controls=today,next,prev&title=Our%20Schedule" 
                    style="border: none; width: 100%; height: 100%;" 
                    frameborder="0">
                </iframe>
            </div>
        </section>

        <section class="retro-window full-width">
            <div class="window-header orange-variant">
                <span>Diagnostics_Log: Empty_Day_Prep_Scanner.exe</span>
                <span>✖</span>
            </div>
            <div class="window-body">
                <div class="prep-log" id="prep-alert-terminal">
                    Scanning active iCloud streams... 
                </div>
            </div>
        </section>
        
        <section class="retro-window">
            <div class="window-header">
                <span>Group Chat: What's Cooking This Week?</span>
                <span>✖</span>
            </div>
            <div class="window-body chat-layout" id="meal-chat-container">
                </div>
        </section>

        <section class="retro-window">
            <div class="window-header blue-variant">
                <span>System Error: Missing Ingredients</span>
                <span>✖</span>
            </div>
            <div class="checker-banner"></div>
            <div class="window-body">
                <div class="search-bar-container">
                    <input type="text" id="item-input" class="retro-input" placeholder="Search / Add item...">
                    <button onclick="addItem()" class="retro-btn">Enter...</button>
                </div>
                <ul class="shopping-list" id="shopping-list">
                    </ul>
            </div>
        </section>

    </main>

    <script>
        const fullDayNames = ['Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday', 'Sunday'];
        const shortDayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        
        // NEW FRESH LOCALSTORAGE SCHEMAS (Clears older corrupted keys)
        let mealPlan = {};
        try {
            const savedMeals = localStorage.getItem('food_os_meals_v3');
            if (savedMeals) mealPlan = JSON.parse(savedMeals);
        } catch (e) { console.error("Storage read blocked:", e); }

        let shoppingList = [];
        try {
            const savedShopping = localStorage.getItem('food_os_shopping_v3');
            if (savedShopping) {
                shoppingList = JSON.parse(savedShopping);
            } else {
                shoppingList = [
                    { name: 'Oat Milk', checked: false },
                    { name: 'Tomatoes', checked: true }
                ];
            }
        } catch (e) { console.error("Storage read blocked:", e); }

        // GENERATE PLANNER INTERFACE
        const chatContainer = document.getElementById('meal-chat-container');
        fullDayNames.forEach(day => {
            if (!mealPlan[day]) mealPlan[day] = { lunch: '', dinner: '' };
            
            const daySection = document.createElement('div');
            daySection.className = 'day-bubble-row';
            daySection.innerHTML = `
                <div class="day-tag">● User_${day}</div>
                <div class="lunch-box">
                    <input type="text" class="chat-bubble-input" value="${mealPlan[day].lunch || ''}" placeholder="Lunch plan..." oninput="updateMeal('${day}', 'lunch', this.value)">
                </div>
                <div class="dinner-box">
                    <input type="text" class="chat-bubble-input" value="${mealPlan[day].dinner || ''}" placeholder="Dinner plan..." oninput="updateMeal('${day}', 'dinner', this.value)">
                </div>
            `;
            chatContainer.appendChild(daySection);
        });

        function updateMeal(day, mealType, value) {
            mealPlan[day][mealType] = value;
            try {
                localStorage.setItem('food_os_meals_v3', JSON.stringify(mealPlan));
            } catch(e) {}
        }

        // LIVE AUTOMATED CALENDAR TIMELINE ANALYSIS
        async function runPrepDiagnostics() {
            const logTerminal = document.getElementById('prep-alert-terminal');
            const rawIcalUrl = "https://p71-caldav.icloud.com/published/2/NDExODI0MTIzNDExODI0MYev8Apu_-PoflykAHs6lUaUKgnPiG8zFY4VKkUpkx4N8xkW8ITpSd5sVW5iC5foEhNZZwxGqCzUL43NeMX_wtE";
            const secureProxyUrl = `https://corsproxy.io/?${encodeURIComponent(rawIcalUrl)}`;

            try {
                const response = await fetch(secureProxyUrl);
                if (!response.ok) throw new Error("Connection failed");
                const rawDataString = await response.text();

                const today = new Date();
                today.setHours(0,0,0,0);
                
                const bookedDatesSet = new Set();
                const matches = rawDataString.match(/DTSTART[^:]*:([0-9]{8})/g);
                
                if (matches) {
                    matches.forEach(match => {
                        const datePart = match.split(':')[1];
                        const year = parseInt(datePart.substring(0, 4));
                        const month = parseInt(datePart.substring(4, 6)) - 1;
                        const day = parseInt(datePart.substring(6, 8));
                        const parsedDate = new Date(year, month, day);
                        parsedDate.setHours(0,0,0,0);
                        bookedDatesSet.add(parsedDate.getTime());
                    });
                }

                logTerminal.innerHTML = '';
                let alertCounter = 0;

                for (let dayOffset = 0; dayOffset < 14; dayOffset++) {
                    const checkDay = new Date(today);
                    checkDay.setDate(today.getDate() + dayOffset);
                    const timelineStamp = checkDay.getTime();
                    
                    if (!bookedDatesSet.has(timelineStamp)) {
                        alertCounter++;
                        const weekdayLabel = shortDayNames[checkDay.getDay()];
                        const numericLabel = `${checkDay.getDate().toString().padStart(2, '0')}/${(checkDay.getMonth()+1).toString().padStart(2, '0')}`;
                        
                        const alertRow = document.createElement('div');
                        alertRow.className = 'prep-item';
                        alertRow.style.color = '#ff4d4d'; 
                        alertRow.innerHTML = `⚠️ ALERT: [${weekdayLabel} ${numericLabel}] has no calendar event. Plan meals/prep accordingly!`;
                        logTerminal.appendChild(alertRow);
                    }
                }

                if (alertCounter === 0) {
                    logTerminal.innerHTML = "🏁 SCANNER RESUME: 100% of the next 14 days have events booked. No preparation gaps flagged.";
                    logTerminal.style.color = "#1aff1a";
                }

            } catch (error) {
                logTerminal.innerHTML = "❌ INTERFACE DISCONNECT: Cloud matrix streams are dropping requests. Retrying data extraction pipes on next viewport update...";
                logTerminal.style.color = "#ff4d4d";
            }
        }

        // GROCERY CHECKLIST LOGIC
        function renderShoppingList() {
            const listEl = document.getElementById('shopping-list');
            listEl.innerHTML = '';
            
            shoppingList.forEach((item, index) => {
                const li = document.createElement('li');
                li.className = `grocery-item ${item.checked ? 'checked' : ''}`;
                li.innerHTML = `
                    <div class="retro-checkbox" onclick="toggleItem(${index})"></div>
                    <span class="item-text" onclick="toggleItem(${index})">${item.name}</span>
                    <button class="delete-btn" onclick="deleteItem(${index})">⌫</button>
                `;
                listEl.appendChild(li);
            });
            try {
                localStorage.setItem('food_os_shopping_v3', JSON.stringify(shoppingList));
            } catch(e) {}
        }

        function addItem() {
            const input = document.getElementById('item-input');
            const val = input.value.trim();
            if (val !== '') {
                shoppingList.push({ name: val, checked: false });
                input.value = '';
                renderShoppingList();
            }
        }

        document.getElementById('item-input').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') addItem();
        });

        function toggleItem(index) {
            shoppingList[index].checked = !shoppingList[index].checked;
            renderShoppingList();
        }

        function deleteItem(index) {
            shoppingList.splice(index, 1);
            renderShoppingList();
        }

        renderShoppingList();
        runPrepDiagnostics();
    </script>
</body>
</html>
